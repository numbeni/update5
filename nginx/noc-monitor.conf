# ─────────────────────────────────────────────────────────────────────────────
# NOC Monitor — Nginx reverse-proxy config
#
# Place this file in /etc/nginx/sites-available/noc-monitor
# Then enable it:
#   sudo ln -s /etc/nginx/sites-available/noc-monitor /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Get a free SSL cert with Let's Encrypt:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d your-domain.com
#
# Replace YOUR_DOMAIN with your actual domain (e.g. noc.mycompany.com)
# ─────────────────────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# HTTPS — main server block
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name YOUR_DOMAIN;

    # ── SSL (managed by certbot — do not edit manually) ──────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection          "1; mode=block" always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/x-font-ttf font/woff2;
    gzip_min_length 1000;

    # ── SSE (Server-Sent Events) — monitoring stream ─────────────────────────
    # Must NOT buffer SSE responses — disable buffering for /api/*/stream
    location ~ ^/api/.*stream {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # SSE-specific: keep connection open, no buffering
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     86400s;  # 24 h — keeps SSE alive
        proxy_send_timeout     86400s;
        chunked_transfer_encoding on;
    }

    # ── All other requests ────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_buffering     on;
        proxy_buffer_size   16k;
        proxy_buffers       4 32k;

        # Pass cookies correctly
        proxy_cookie_path / /;
    }

    # ── Static asset caching (served by Express, but nginx can cache) ─────────
    location ~* \.(js|css|woff2?|ico|svg|png|jpg|webp)$ {
        proxy_pass          http://127.0.0.1:5000;
        proxy_http_version  1.1;
        proxy_set_header    Host            $host;
        proxy_set_header    X-Real-IP       $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;

        expires     7d;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }
}
